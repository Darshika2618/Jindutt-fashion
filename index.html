<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jindutt Fashion</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f5f5;
        }
        header {
            background: black;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
        }
        .container {
            padding: 20px;
        }
        .product {
            background: white;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            display: inline-block;
            width: 200px;
            text-align: center;
        }
        button {
            background: black;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>Jindutt Fashion 👗</header>

<div class="container">
    <div class="product">
        <h3>Stylish Saree</h3>
        <p>₹999</p>
        <button>Buy Now</button>
    </div>

    <div class="product">
        <h3>Kurti Set</h3>
        <p>₹799</p>
        <button>Buy Now</button>
    </div>

    <div class="product">
        <h3>Designer Dress</h3>
        <p>₹1499</p>
        <button>Buy Now</button>
    </div>
</div>

</body>
</html>
