<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ffffff;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: white;
    border-bottom: 1px solid #eee;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 2px;
}

nav a {
    margin: 0 10px;
    text-decoration: none;
    color: black;
    font-size: 14px;
}

/* HERO */
.hero {
    height: 80vh;
    background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
    url('https://images.unsplash.com/photo-1520975916090-3105956dac38') center/cover;

    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
}

    margin: 0;
}

.hero-text p {
    font-size: 18px;
}

/* PRODUCTS */
.products {
    padding: 40px;
    text-align: center;
}

.product {
    display: inline-block;
    width: 250px;
    margin: 20px;
    transition: 0.3s;
}

.product:hover {
    transform: scale(1.05);
}

.product img {
    width: 100%;
    border-radius: 10px;
}

button {
    padding: 10px 15px;
    border: none;
    background: black;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #444;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: #111;
    color: white;
}
</style>
